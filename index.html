<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mouse Evolution</title>
    <style>
        body {
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐭 Mouse Evolution</h1>
        <p>Click a button to test:</p>
        <button onclick="handleTeacher()">🎓 Teacher</button>
        <button onclick="handleStudent()">👤 Student</button>
    </div>

    <script>
        function handleTeacher() {
            alert('Teacher button works!');
        }
        
        function handleStudent() {
            alert('Student button works!');
        }
    </script>
</body>
</html>
